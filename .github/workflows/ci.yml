name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

# To speedup CI builds, the following derivations should be cached to `veridise-public`:
# - ".#packages.x86_64-linux.rust-stable"
# - ".#packages.x86_64-linux.rust-nightly"

jobs:
  nix-environment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
          extra_nix_config: |
            download-buffer-size = 67108864
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: true
          use-flakehub: false
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
          authToken: '${{ secrets.CACHIX_PUBLIC_TOKEN }}'
      - name: Pre-build nix environments
        run: |
          nix build --no-link \
            .#devShells.x86_64-linux.default \
            .#devShells.x86_64-linux.nightly
        env:
          CI_BOT_PAT: "${{ secrets.CI_BUILD_TOKEN }}"

  build:
    needs: nix-environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        BUILD_TARGET:
          - release
          - dev
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
          extra_nix_config: |
            download-buffer-size = 67108864
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: true
          use-flakehub: false
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
          authToken: '${{ secrets.CACHIX_PUBLIC_TOKEN }}'
      - name: Set nix environment
        uses: nicknovitski/nix-develop@v1
        env:
          CI_BOT_PAT: "${{ secrets.CI_BUILD_TOKEN }}"
      - name: Cache cargo crates
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.BUILD_TARGET }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build in "${{ matrix.BUILD_TARGET }}" mode
        run: cargo build --profile ${{ matrix.BUILD_TARGET }} --all-features
      - name: Run tests in "${{ matrix.BUILD_TARGET }}" mode
        run: cargo test --profile ${{ matrix.BUILD_TARGET }} --all-features

  # WARNING: do not change this job name. It is a required status check for PRs to `main`.
  build-result:
    needs:
      - nix-environment
      - build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Verify all build steps passed
        run: |
          if [[ "${{ needs.nix-environment.result }}" != "success" ]]; then
            echo "nix environment setup failed or was cancelled"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "build failed or was cancelled"
            exit 1
          fi

  # WARNING: do not change this job name. It is a required status check for PRs to `main`.
  asan:
    needs: nix-environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
          extra_nix_config: |
            download-buffer-size = 67108864
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: true
          use-flakehub: false
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
          authToken: '${{ secrets.CACHIX_PUBLIC_TOKEN }}'
      - name: Set nix environment
        uses: nicknovitski/nix-develop@v1
        with:
          arguments: "'.#nightly'"
        env:
          CI_BOT_PAT: "${{ secrets.CI_BUILD_TOKEN }}"
      - name: Set sanitizer options
        run: |
          supp=$(pwd)/.lsan.supp
          if [ -e "$supp" ]; then
            echo "::debug::Set suppressions file to $supp"
            echo LSAN_OPTIONS="$LSAN_OPTIONS:suppressions=$supp" >> $GITHUB_ENV
          fi
          echo ASAN_OPTIONS=detect_odr_violation=2:symbolize=1 >> $GITHUB_ENV
      - name: Add sanitizer rust flag
        run: |
          echo RUSTFLAGS="$RUSTFLAGS -Zsanitizer=address" >> $GITHUB_ENV
      - name: Cache cargo crates
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-asan-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Get default rustc target
        run: |
          rustc -vV | sed -n 's|host: |DEFAULT_RUST_TARGET=|p' >> $GITHUB_ENV
      - name: Build
        run: cargo build --target=$DEFAULT_RUST_TARGET --profile=dev --all-features
      - name: Run tests
        run: cargo test --target=$DEFAULT_RUST_TARGET --profile=dev --all-features

  # WARNING: do not change this job name. It is a required status check for PRs to `main`.
  clippy:
    needs: nix-environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.31.2/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
          extra_nix_config: |
            download-buffer-size = 67108864
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-gha-cache: true
          use-flakehub: false
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
          authToken: '${{ secrets.CACHIX_PUBLIC_TOKEN }}'
      - name: Set nix environment
        uses: nicknovitski/nix-develop@v1
        env:
          CI_BOT_PAT: "${{ secrets.CI_BUILD_TOKEN }}"
      - name: Cache cargo crates
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-features --tests -- --no-deps
